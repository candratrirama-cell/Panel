<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin RaBot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-5">
    <div id="loginPage" class="fixed inset-0 bg-black flex items-center justify-center z-50">
        <div class="bg-gray-800 p-8 rounded shadow-xl text-center">
            <h2 class="text-xl mb-4 font-bold">Akses Terkunci</h2>
            <input type="password" id="p" placeholder="Password" class="p-2 rounded bg-gray-700 mb-4 block w-full text-center">
            <button onclick="login()" class="bg-blue-600 px-10 py-2 rounded">Buka Panel</button>
        </div>
    </div>

    <div id="panel" class="hidden max-w-xl mx-auto">
        <h1 class="text-2xl font-bold border-b border-gray-700 pb-2 mb-4">RaBot Panel v1.1</h1>
        <div class="flex gap-2 mb-4">
            <button onclick="cmd('start')" class="bg-green-600 flex-1 py-2 rounded font-bold">START</button>
            <button onclick="cmd('stop')" class="bg-red-600 flex-1 py-2 rounded font-bold">STOP</button>
        </div>
        <input type="file" id="f" class="block w-full text-sm mb-4">
        <button onclick="up()" class="bg-indigo-600 w-full py-2 rounded mb-4">Upload & Ekstrak ZIP</button>
        <pre id="l" class="bg-black p-3 h-64 overflow-y-auto text-xs text-green-400 font-mono rounded"></pre>
    </div>

    <script>
        let k = "";
        function login() {
            k = document.getElementById('p').value;
            if(k === "190713") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                setInterval(refresh, 2000);
            } else { alert("Salah!"); }
        }
        async function refresh() {
            const r = await fetch(`/api/status?pass=${k}`);
            const d = await r.json();
            document.getElementById('l').innerText = d.logs;
        }
        async function cmd(a) { await fetch('/api/control', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action:a, pass:k}) }); }
        async function up() {
            const fd = new FormData();
            fd.append('botZip', document.getElementById('f').files[0]);
            fd.append('pass', k);
            await fetch('/api/upload', { method: 'POST', body: fd });
            alert("Selesai diupload!");
        }
    </script>
</body>
</html>
